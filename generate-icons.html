<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Vedia Flow - Icon Generator</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; background: #0f0f12; color: #fff; }
    canvas { border: 1px solid #333; margin: 10px; }
    button { padding: 12px 24px; background: #6366f1; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <h1>Vedia Flow - Icon Generator</h1>
  <p>กดปุ่มด้านล่างเพื่อ download icons ทุกขนาด</p>
  <div id="canvases"></div>
  <br>
  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    const sizes = [16, 32, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // พื้นหลังไล่สี
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#6366f1');
      gradient.addColorStop(1, '#8b5cf6');
      ctx.fillStyle = gradient;

      // วาดสี่เหลี่ยมมุมมน
      const radius = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fill();

      // วาดตัว "V"
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 0.55}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('V', size / 2, size / 2);

      document.getElementById('canvases').appendChild(canvas);
      return canvas;
    }

    const canvases = {};
    sizes.forEach(size => {
      canvases[size] = drawIcon(size);
    });

    function downloadAll() {
      sizes.forEach(size => {
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvases[size].toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>

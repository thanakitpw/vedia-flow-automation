<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Vedia Flow - Icon Generator</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; background: #0f0f12; color: #fff; }
    canvas { border: 1px solid #333; margin: 10px; border-radius: 8px; }
    button { padding: 12px 24px; background: #6366f1; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; }
    button:hover { background: #4f46e5; }
    .preview { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>Vedia Flow - Icon Generator</h1>
  <p>กดปุ่มด้านล่างเพื่อ download icons ทุกขนาด</p>
  <div class="preview" id="canvases"></div>
  <br>
  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    const sizes = [16, 32, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // พื้นหลังไล่สี (ม่วง → น้ำเงิน)
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#6366f1');
      gradient.addColorStop(0.5, '#7c3aed');
      gradient.addColorStop(1, '#4f46e5');
      ctx.fillStyle = gradient;

      // วาดสี่เหลี่ยมมุมมน
      const radius = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fill();

      // วาดตัว V สีขาว
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#ffffff';
      const thick = Math.max(2, size * 0.12);
      ctx.lineWidth = thick;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      ctx.beginPath();
      ctx.moveTo(size * 0.22, size * 0.22);
      ctx.lineTo(size * 0.50, size * 0.78);
      ctx.lineTo(size * 0.78, size * 0.22);
      ctx.stroke();

      // เพิ่มเงาเล็กน้อย
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur = size * 0.05;

      const wrapper = document.createElement('div');
      wrapper.style.textAlign = 'center';
      wrapper.innerHTML = `<div style="color:#888;font-size:12px;margin-top:4px;">${size}x${size}</div>`;
      wrapper.prepend(canvas);
      document.getElementById('canvases').appendChild(wrapper);
      return canvas;
    }

    const canvases = {};
    sizes.forEach(size => {
      canvases[size] = drawIcon(size);
    });

    function downloadAll() {
      sizes.forEach(size => {
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvases[size].toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
